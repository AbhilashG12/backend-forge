version: '3.8'

services:
 
  mysql:
    image: mysql:8.0
    container_name: platform-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: backend-forge
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  
  redis:
    image: redis:7-alpine
    container_name: platform-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  
  auth-service:
    build: 
      context: ../      
      dockerfile: Dockerfile
    container_name: auth-service
    command: pnpx tsx apps/auth-service/src/index.ts
    environment:
      - DATABASE_URL=mysql://root:root@mysql:3306/backend-forge
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=mysupersecreykey123
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  
  user-service:
    build: 
      context: ../
      dockerfile: Dockerfile
    container_name: user-service
    command: pnpx tsx apps/user-service/src/index.ts
    environment:
      - DATABASE_URL=mysql://root:root@mysql:3306/backend-forge
      - REDIS_URL=redis://redis:6379
      - PORT=3002
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

   
  job-service:
    build: 
      context: ../
      dockerfile: Dockerfile
    container_name: job-service
    command: pnpx tsx apps/job-service/src/index.ts
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3003
    ports:
      - "3003:3003"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  api-gateway:
    build: 
      context: ../
      dockerfile: Dockerfile
    container_name: api-gateway
    command: pnpx tsx apps/api-gateway/src/index.ts
    environment:
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=mysupersecreykey123
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      - JOB_SERVICE_URL=http://job-service:3003
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      job-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mysql_data: